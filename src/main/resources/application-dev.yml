spring:
  cache:
    type: redis   # 👈 enables Redis as Spring Cache
  data:
    mongodb:
      uri: mongodb+srv://admin:admin@dearlavioncluster.xnanadi.mongodb.net/notification-service?retryWrites=true&w=majority&appName=DearLavionCluster
      auto-index-creation: true
      socket-timeout: 20000
      connect-timeout: 10000
  main:
    allow-circular-references: true
  jackson:
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false
  redis:
    enabled: false
    host: dearlavion-redis
    port: 6379
    timeout: 5000ms
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
server:
  port: 8083
  address: 0.0.0.0

kafka:
  enabled: false

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui/index.html

logging:
  level:
    org.springframework.boot.autoconfigure.mongo: DEBUG

openai:
  enabled: false
  api-key: 123
